<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111217"/>
      <stop offset="100%" stop-color="#111217"/>
    </linearGradient>
    <linearGradient id="card-front" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#111217"/>
  <!-- Back card -->
  <rect x="30" y="24" width="68" height="48" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Middle card -->
  <rect x="26" y="38" width="76" height="48" rx="6" fill="#1a3050" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Front card -->
  <rect x="22" y="52" width="84" height="56" rx="6" fill="url(#card-front)"/>
  <!-- Index lines on front card -->
  <rect x="32" y="62" width="40" height="3" rx="1.5" fill="#fff" opacity=".95"/>
  <rect x="32" y="70" width="30" height="3" rx="1.5" fill="#50e6ff" opacity=".85"/>
  <rect x="32" y="78" width="50" height="3" rx="1.5" fill="#fff" opacity=".75"/>
  <rect x="32" y="86" width="26" height="3" rx="1.5" fill="#50e6ff" opacity=".65"/>
  <rect x="32" y="94" width="36" height="3" rx="1.5" fill="#fff" opacity=".55"/>
  <!-- Index tab -->
  <rect x="80" y="56" width="18" height="10" rx="3" fill="#50e6ff"/>
</svg>
