title = "Index Server Gitleaks Config"

[extend]
useDefault = true

[[allowlists]]
description = "Template-standard exclusions"
  paths = [
    # --- Template-standard exclusions (aligned with .ggshield.yml) ---
    # Dependency and virtual-environment directories
    '''node_modules/''',
    '''\.venv/''',
    '''venv/''',
    '''__pycache__/''',
    '''vendor/''',
    '''packages/''',
    '''\.tox/''',
    '''bower_components/''',
    # Build outputs
    '''dist/''',
    '''build/''',
    '''\.next/''',
    '''\.nuxt/''',
    '''obj/''',
    '''bin/''',
    '''out/''',
    '''publish/''',
    # Caches and VCS
    '''\.git/''',
    '''\.hg/''',
    '''\.svn/''',
    '''\.cache/''',
    '''\.cache_ggshield/''',
    '''^\.codeql/''',
    '''\.mypy_cache/''',
    '''\.pytest_cache/''',
    '''coverage/''',
    '''\.nyc_output/''',
    # Infrastructure state
    '''\.terraform/''',
    # Lock files
    '''package-lock\.json$''',
    '''yarn\.lock$''',
    '''pnpm-lock\.yaml$''',
    '''Gemfile\.lock$''',
    '''poetry\.lock$''',
    '''Pipfile\.lock$''',
    '''composer\.lock$''',
  ]

# --- Repo-specific allowlists ---
[[allowlists]]
description = "Detect-secrets baseline hashes"
paths = [
	'''^\.secrets\.baseline$''',
]

[[allowlists]]
description = "Known test fixture and lockfile false positives"
paths = [
	'''^package-lock\.json$''',
	'''^scripts/gen-ai/test-data/large-files/large-file-2\.txt$''',
	'''^scripts/gen-ai/test-data/secrets\.txt$''',
	'''^src/tests/postinstall\.spec\.ts$''',
	'''^src/tests/integration/auth\.spec\.ts$''',
	'''^src/tests/unit/config\.spec\.ts$''',
]

[[allowlists]]
description = "Local certificate and backup artifacts outside the source review surface"
paths = [
  '''^certs/''',
	'''^\.certs/''',
	'''^backups/''',
]
