name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview without publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  packages: write

jobs:
  publish-github-packages:
    name: Publish GitHub Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jagilber-org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run 2>&1 | head -50

      - name: Create tarball
        id: pack
        run: |
          TARBALL=$(npm pack | tail -1)
          echo "tarball=$TARBALL" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Packages (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm publish "${{ steps.pack.outputs.tarball }}" --dry-run --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Publish to GitHub Packages
        if: github.event.inputs.dry_run == 'false'
        run: npm publish "${{ steps.pack.outputs.tarball }}" --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
