name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: |
          if [ -f package.json ]; then npm run lint --if-present; fi
      - name: Build (explicit, before tests)
        run: |
          npm run build --if-present
      - name: Ensure instructions directory
        run: |
          mkdir -p instructions
          if [ ! "$(ls instructions/*.json 2>/dev/null)" ]; then
            echo '{"id":"ci-seed","title":"CI Seed","body":"Seed instruction for CI.","version":"1.0.0","status":"active","tags":["ci"]}' > instructions/ci-seed.json
          fi
      - name: Verify dist artifacts
        run: |
          echo "Listing dist/server contents (if any)";
          if [ -d dist/server ]; then ls -al dist/server; else echo "dist/server missing"; fi
          if [ ! -f dist/server/index-server.js ]; then echo "ERROR: dist/server/index-server.js not found; failing early"; exit 1; fi
      - name: Test
        run: |
          # Fast suite on PRs to conserve Actions minutes; full coverage runs
          # on main pushes (event_name != 'pull_request'). The slow concurrent /
          # stress / multi-instance suites have their own dedicated workflows
          # (multi-agent-concurrency.yml, stress-nightly.yml, multi-instance-validation.yml).
          mkdir -p test-results
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR run: using test:fast (no coverage) to conserve minutes"
            npm test --if-present 2>&1 | tee test-results/test-output.log
          else
            echo "Push/dispatch run: full coverage suite"
            (npm run coverage:ci --if-present || npm test --if-present) 2>&1 | tee test-results/test-output.log
          fi
      - name: Validate test artifacts (no leakage, no oversized files)
        if: always()
        run: node scripts/governance/validate-no-test-artifacts.mjs
      - name: Crawl test logs (hygiene gate — fail on repeat-spam / WARN+stack)
        if: always()
        # Per-signature repeat threshold and stack-warn budget both default to 25.
        # Known operational categories (search input validation, embedding fallback,
        # invariant-repair fixtures, etc.) are signature-allowlisted in
        # .crawl-logs-allowlist with one-line rationales per OB-6.
        run: |
          node scripts/diagnostics/crawl-logs.mjs \
            --dir logs \
            --file test-results/test-output.log \
            --allowlist .crawl-logs-allowlist \
            --summary test-results/log-hygiene.json \
            --strict
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/cobertura-coverage.xml,./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          directory: ./coverage
      - name: Upload coverage (directory)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: warn
      - name: Upload coverage lcov
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/junit.xml
          fail_ci_if_error: false
      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results
          if-no-files-found: warn
      - name: Upload server and trace logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs
          path: |
            logs/
            *.log
          retention-days: 7
          if-no-files-found: warn
