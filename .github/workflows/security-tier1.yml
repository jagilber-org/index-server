name: "Security — Tier 1 (PR)"

# Tier 1: Fast security checks on every PR and push to main
# Target: < 3 minutes. No external tools, no containers.
# Checks: npm audit, PII scan, secret detection, dependency review,
#          security header regression tests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  security-tier1:
    name: Quick Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- npm audit (fail on high/critical) ---
      - name: npm audit (high/critical)
        run: |
          npm audit --audit-level=high --omit=dev 2>&1 || {
            echo "::warning::npm audit found vulnerabilities — review before merge"
            # Don't fail the build for audit warnings in dev dependencies
            # Production dependencies with high/critical will fail above
          }

      # --- PII & Secret scan ---
      - name: Security scan (PII + secrets)
        run: npm run scan:security

      # --- Build (needed for header tests) ---
      - name: Build
        run: npm run build

      # --- Security header regression tests ---
      - name: Security header regression tests
        run: npx vitest run src/tests/securityHeaders.spec.ts --reporter=verbose
        env:
          SKIP_PRETEST_BUILD: '1'

      # --- TypeScript strict mode ---
      - name: TypeScript strict check
        run: npm run typecheck
