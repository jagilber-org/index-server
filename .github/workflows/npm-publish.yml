name: Publish to npm [DISABLED]

# This workflow is disabled. Package releases now go only to GitHub Packages.
# See: https://github.com/jagilber-org/index-server/pkgs/npm/index-server

on:
  # Disabled — workflow will not trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview without publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  # This job is intentionally empty. npm package publishing now happens via
  # Release.yml → GitHub Packages registry only.
  publish:
    runs-on: ubuntu-latest
    steps:
      - run: echo "npmjs publishing disabled. All releases go to GitHub Packages only."
