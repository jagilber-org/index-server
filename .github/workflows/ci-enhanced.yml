name: CI Enhanced

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

jobs:
  # Parallel job for faster execution
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
          key: lint-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            lint-${{ runner.os }}-node22-
      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Security scan
        run: npm run scan:security

  build-and-test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]
    steps:
      - uses: actions/checkout@v6
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
          key: build-${{ runner.os }}-node${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('vitest.config.ts') }}
          restore-keys: |
            build-${{ runner.os }}-node${{ matrix.node-version }}-
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure instructions directory
        shell: bash
        run: |
          mkdir -p instructions
          if [ ! "$(ls instructions/*.json 2>/dev/null)" ]; then
            echo '{"id":"ci-seed","title":"CI Seed","body":"Seed instruction for CI.","version":"1.0.0","status":"active","tags":["ci"]}' > instructions/ci-seed.json
          fi

      - name: Validate no test artifacts in instructions
        run: node scripts/validate-no-test-artifacts.mjs

      - name: Verify build artifacts
        shell: bash
        run: |
          echo "Verifying dist/server/index-server.js exists..."
          if [ ! -f dist/server/index-server.js ]; then
            echo "❌ ERROR: dist/server/index-server.js not found"
            exit 1
          fi
          echo "✅ Build artifacts verified"

      - name: Run skip guard
        run: npm run guard:skips

      - name: Run tests
        run: npm test
        env:
          SKIP_PRETEST_BUILD: '1'  # Skip since we already built

      - name: Run contract tests
        run: npm run test:contracts

      - name: Flake Sentinel (rerun failing files)
        if: always()
        run: node scripts/flake-sentinel.mjs
        env:
          FLAKE_RERUNS: '2'
          ALLOW_FLAKY: '0'

      - name: Flake Trend Aggregation
        if: always()
        run: node scripts/flake-trend.mjs
        env:
          FLAKE_TREND_MAX: '75'

      - name: Flake Gate (enforce thresholds)
        if: always()
        run: |
          echo "[flake-gate] Using thresholds: files=${FLAKE_GATE_MAX_FILES:-0} occ=${FLAKE_GATE_MAX_OCCURRENCES:-0} enabled=${FLAKE_GATE_ENABLED:-0}";
          node scripts/flake-gate.mjs
        env:
          # Static defaults; set to 1 and thresholds in future via repo-level env or inline edits.
          FLAKE_GATE_ENABLED: '0'
          FLAKE_GATE_MAX_FILES: '0'
          FLAKE_GATE_MAX_OCCURRENCES: '0'

      - name: Generate coverage
        env:
          INDEX_SERVER_EVENT_SILENT: '1'
          INDEX_SERVER_LOG_SYNC: '1'
          # Ratchet Stage 0: set hard floor just below current baseline (46.83) to prevent regressions; advisory target 60.
          INDEX_SERVER_COVERAGE_HARD_MIN: '46'
          INDEX_SERVER_COVERAGE_TARGET: '60'
        run: npm run coverage:ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}-node${{ matrix.node-version }}
          path: coverage/coverage.xml
          retention-days: 7

      - name: Upload to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.xml,coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }} && matrix.os == 'ubuntu-latest'
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/junit.xml
          fail_ci_if_error: false

      - name: Upload flakiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake-analysis-${{ matrix.os }}
          path: |
            test-results/flaky-tests.json
            test-results/flake-history.jsonl
            test-results/flake-trend-summary.json
            test-results/reruns/
          retention-days: 10

      - name: Generate manifest (PR only)
        if: github.event_name == 'pull_request'
        run: npm run manifest:generate

      - name: Upload manifest (PR only)
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: Index-manifest
          path: snapshots/Index-manifest.json

      - name: Generate SBOM (best-effort, PR only)
        if: github.event_name == 'pull_request'
        run: npm run sbom || true

      - name: Upload SBOM (PR only)
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  dist-freshness:
    name: Dist Freshness Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check dist freshness
        run: npm run check:dist

  performance-baseline:
    name: Performance Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run performance baseline
        run: npm run perf:baseline
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: perf-results.json
          retention-days: 30

  release-validation:
    name: Release Validation
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build and verify
        run: npm run build:verify
      - name: Generate manifest
        run: npm run manifest:generate
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/
            snapshots/Index-manifest.json
            sbom.json

  notify-completion:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build-and-test]
    if: always()
    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" == "success" && "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "✅ All CI checks passed successfully"
          else
            echo "❌ Some CI checks failed"
            exit 1
          fi
