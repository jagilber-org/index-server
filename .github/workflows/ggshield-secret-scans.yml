name: GGShield Secret Scans

on:
  pull_request:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Scan mode to run
        required: true
        default: changes
        type: choice
        options:
          - changes
          - commit-range
          - repo
      commit_range:
        description: Git commit range for commit-range mode, for example origin/main...HEAD
        required: false
        type: string
      repository_path:
        description: Repository path for repo mode
        required: false
        default: .
        type: string
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  ggshield-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6 # pii-allowlist: pinned action SHA
        with:
          python-version: '3.12'

      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install ggshield

      - name: Run mandatory PR commit-range scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GGSHIELD_QUOTA_MODE: advisory
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          bash scripts/ci/ggshield-with-retry.sh secret scan commit-range "$BASE_SHA...$HEAD_SHA"

  ggshield-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6 # pii-allowlist: pinned action SHA
        with:
          python-version: '3.12'

      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install ggshield

      - name: Run manual ggshield scan
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          SCAN_MODE: ${{ inputs.scan_mode }}
          COMMIT_RANGE: ${{ inputs.commit_range }}
          REPOSITORY_PATH: ${{ inputs.repository_path }}
        run: |
          if [ "$SCAN_MODE" = "changes" ]; then
            bash scripts/ci/ggshield-with-retry.sh secret scan changes
          elif [ "$SCAN_MODE" = "commit-range" ]; then
            if [ -z "$COMMIT_RANGE" ]; then
              echo "commit_range input is required for commit-range mode" >&2
              exit 2
            fi
            bash scripts/ci/ggshield-with-retry.sh secret scan commit-range "$COMMIT_RANGE"
          elif [ "$SCAN_MODE" = "repo" ]; then
            bash scripts/ci/ggshield-with-retry.sh secret scan repo "$REPOSITORY_PATH"
          else
            echo "Unsupported scan mode: $SCAN_MODE" >&2
            exit 2
          fi

  ggshield-scheduled:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6 # pii-allowlist: pinned action SHA
        with:
          python-version: '3.12'

      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          pip install ggshield

      - name: Run scheduled full-repo audit
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          bash scripts/ci/ggshield-with-retry.sh secret scan repo .
