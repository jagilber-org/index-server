name: Gitleaks Secret Scans

on:
  pull_request:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Scan mode to run
        required: true
        default: repo
        type: choice
        options:
          - repo
          - history
      log_options:
        description: Additional git log options for history mode, for example --all or --since='90 days ago'
        required: false
        default: --all
        type: string
  schedule:
    - cron: '23 4 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  gitleaks-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'  # pragma: allowlist secret
        run: |
          set -euo pipefail
          curl -sSfLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version

      - name: Run pull request commit-range scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p reports
          gitleaks git --log-opts="$BASE_SHA..$HEAD_SHA" --report-format sarif --report-path reports/gitleaks-report.sarif .

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b  # v4 # pii-allowlist: pinned action SHA
        with:
          sarif_file: reports/gitleaks-report.sarif
          wait-for-processing: false
        continue-on-error: true

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7 # pii-allowlist: pinned action SHA
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore

  gitleaks-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'  # pragma: allowlist secret
        run: |
          set -euo pipefail
          curl -sSfLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version

      - name: Run manual gitleaks scan
        env:
          SCAN_MODE: ${{ inputs.scan_mode }}
          LOG_OPTIONS: ${{ inputs.log_options }}
        run: |
          mkdir -p reports
          if [ "$SCAN_MODE" = "repo" ]; then
            gitleaks dir . --report-format sarif --report-path reports/gitleaks-report.sarif
          elif [ "$SCAN_MODE" = "history" ]; then
            gitleaks git --log-opts="$LOG_OPTIONS" --report-format sarif --report-path reports/gitleaks-report.sarif .
          else
            echo "Unsupported scan mode: $SCAN_MODE" >&2
            exit 2
          fi

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b  # v4 # pii-allowlist: pinned action SHA
        with:
          sarif_file: reports/gitleaks-report.sarif
          wait-for-processing: false
        continue-on-error: true

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7 # pii-allowlist: pinned action SHA
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore

  gitleaks-scheduled:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'  # pragma: allowlist secret
        run: |
          set -euo pipefail
          curl -sSfLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm -f gitleaks.tar.gz
          gitleaks version

      - name: Run scheduled history scan
        run: |
          mkdir -p reports
          gitleaks git --log-opts="--all" --report-format sarif --report-path reports/gitleaks-report.sarif .

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b  # v4 # pii-allowlist: pinned action SHA
        with:
          sarif_file: reports/gitleaks-report.sarif
          wait-for-processing: false
        continue-on-error: true

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7 # pii-allowlist: pinned action SHA
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore
