name: Gitleaks Secret Scans

on:
  pull_request:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Scan mode to run
        required: true
        default: repo
        type: choice
        options:
          - repo
          - history
      log_options:
        description: Additional git log options for history mode, for example --all or --since='90 days ago'
        required: false
        default: --all
        type: string
  schedule:
    - cron: '23 4 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-pr:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run pull request commit-range scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p reports
          gitleaks git --log-opts="$BASE_SHA..$HEAD_SHA" --report-format sarif --report-path reports/gitleaks-report.sarif .

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks-report.sarif

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore

  gitleaks-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run manual gitleaks scan
        env:
          SCAN_MODE: ${{ inputs.scan_mode }}
          LOG_OPTIONS: ${{ inputs.log_options }}
        run: |
          mkdir -p reports
          if [ "$SCAN_MODE" = "repo" ]; then
            gitleaks dir . --report-format sarif --report-path reports/gitleaks-report.sarif
          elif [ "$SCAN_MODE" = "history" ]; then
            gitleaks git --log-opts="$LOG_OPTIONS" --report-format sarif --report-path reports/gitleaks-report.sarif .
          else
            echo "Unsupported scan mode: $SCAN_MODE" >&2
            exit 2
          fi

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks-report.sarif

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore

  gitleaks-scheduled:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin

      - name: Run scheduled history scan
        run: |
          mkdir -p reports
          gitleaks git --log-opts="--all" --report-format sarif --report-path reports/gitleaks-report.sarif .

      - name: Upload gitleaks SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/gitleaks-report.sarif

      - name: Upload gitleaks artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: reports/gitleaks-report.sarif
          if-no-files-found: ignore
