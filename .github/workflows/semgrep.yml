name: Semgrep Analysis

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/copilot-instructions.md'
      - 'hooks/**'
      - 'scripts/**'
      - '*.json'
      - '*.yml'
      - '*.yaml'
  workflow_dispatch:
  schedule:
    - cron: '31 4 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep workflow and CI scan
        run: |
          mkdir -p reports
          semgrep scan --config p/ci --config p/github-actions --config p/security-audit --config .semgrep.yml --error --sarif --output reports/semgrep-report.sarif .

      - name: Upload Semgrep SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        continue-on-error: true
        with:
          sarif_file: reports/semgrep-report.sarif

      - name: Upload Semgrep artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: semgrep-report
          path: reports/semgrep-report.sarif
          if-no-files-found: ignore
