name: Semgrep Analysis

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/copilot-instructions.md'
      - 'hooks/**'
      - 'scripts/**'
      - '*.json'
      - '*.yml'
      - '*.yaml'
  workflow_dispatch:
  schedule:
    - cron: '31 4 * * 3'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep workflow and CI scan
        run: |
          mkdir -p reports
          semgrep scan --config p/ci --config p/github-actions --error --sarif --output reports/semgrep-report.sarif .

      - name: Upload Semgrep SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/semgrep-report.sarif

      - name: Upload Semgrep artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep-report.sarif
          if-no-files-found: ignore
