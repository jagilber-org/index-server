name: Release

# Unified release workflow triggered by version tags (v*).
# Runs release-scoped validation, builds release artifacts (npm, Docker),
# creates a GitHub Release with changelog, and publishes packages plus MCP metadata.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and test without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/index-server-image
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Validate — type check, lint, build, unit smoke test
  # ──────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit test gate
        run: |
          mkdir -p test-results
          npm run test:unit 2>&1 | tee test-results/test-output.log

      - name: Crawl test logs (hygiene gate)
        if: always()
        # Defaults (max-repeat=25, max-stack-warn=25). Known operational
        # categories are signature-allowlisted in .crawl-logs-allowlist.
        run: |
          node scripts/diagnostics/crawl-logs.mjs \
            --dir logs \
            --file test-results/test-output.log \
            --allowlist .crawl-logs-allowlist \
            --summary test-results/log-hygiene.json \
            --strict

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            coverage/

  # ──────────────────────────────────────────────────────────────────
  # Stage 2a: Build npm package
  # ──────────────────────────────────────────────────────────────────
  build-npm:
    name: Build npm Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: npm pack

      - name: Upload npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: '*.tgz'

  # ──────────────────────────────────────────────────────────────────
  # Stage 2b: Build Docker image
  # ──────────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan with Trivy
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Publish — npm, GitHub Release
  # ──────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-npm, build-docker]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false'
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
      ALLOW_EXTERNAL_PUBLISH: ${{ github.repository_owner == 'jagilber-org' }}
      MCP_USE_GITHUB_OIDC: ${{ github.repository_owner == 'jagilber-org' }}
      HAS_MCP_GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section for this version from CHANGELOG.md
          ESCAPED=$(echo "$VERSION" | sed 's/[.[\*^$()+?{|\\]/\\&/g')
          SECTION=$(sed -n "/^## \[${ESCAPED}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$SECTION" ]; then
            # Fallback: git log between tags
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              SECTION=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            else
              SECTION=$(git log --pretty=format:"- %s (%h)" -20)
            fi
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check npmjs version status
        id: npm_status
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npmjs
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.npm_status.outputs.already_published != 'true' && env.HAS_NPM_TOKEN == 'true'
        run: |
          TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -n "$TARBALL" ]; then
            npm publish "$TARBALL" --provenance
          else
            npm publish --ignore-scripts --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attest npm package
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.npm_status.outputs.already_published != 'true' && env.HAS_NPM_TOKEN == 'true' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: '*.tgz'

      # ──────────────────────────────────────────────────────────────────
      # Publish to GitHub Packages npm registry (parallel target to npmjs).
      # Auth uses the workflow's GITHUB_TOKEN (no extra secret). The package
      # name @jagilber-org/index-server already aligns with the org owner,
      # so no rename is needed.
      # ──────────────────────────────────────────────────────────────────
      - name: Configure GitHub Packages registry
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jagilber-org'

      - name: Check GitHub Packages version status
        id: gpr_status
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "$PKG@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: continue-on-error is intentional. The jagilber-org organization
      # currently has package creation locked down (org settings → Packages →
      # Package Creation). First-time creation of @jagilber-org/index-server
      # via GITHUB_TOKEN returns 403 permission_denied: write_package until
      # either (a) org owner enables Public package creation, or (b) the
      # package is pre-created / repo added to the allowlist. Once the
      # package exists and is linked to this repo, this step starts
      # succeeding automatically — no workflow change needed. Until then we
      # don't want a redundant publish target to fail the entire release.
      - name: Publish to GitHub Packages
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.gpr_status.outputs.already_published != 'true'
        continue-on-error: true
        run: |
          TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -n "$TARBALL" ]; then
            npm publish "$TARBALL" --registry=https://npm.pkg.github.com
          else
            npm publish --ignore-scripts --registry=https://npm.pkg.github.com
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && (env.MCP_USE_GITHUB_OIDC == 'true' || env.HAS_MCP_GITHUB_TOKEN == 'true')
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Select MCP Registry auth mode
        id: mcp_auth
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true'
        run: |
          if [ "${{ env.MCP_USE_GITHUB_OIDC }}" = "true" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ "${{ env.HAS_MCP_GITHUB_TOKEN }}" = "true" ]; then
            echo "mode=pat" >> "$GITHUB_OUTPUT"
          else
            echo "mode=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Require MCP Registry auth for release publish
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'missing'
        run: |
          echo "MCP Registry publish is enabled in this workflow, but no usable auth mode was found." >&2
          echo "Private repo releases must provide MCP_GITHUB_TOKEN; public mirror releases may use GitHub OIDC." >&2
          exit 1

      - name: Authenticate to MCP Registry via GitHub OIDC
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'oidc'
        run: ./mcp-publisher login github-oidc

      - name: Authenticate to MCP Registry via PAT fallback
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'pat'
        run: ./mcp-publisher login github --token "${{ secrets.MCP_GITHUB_TOKEN }}"

      - name: Publish to MCP Registry
        if: env.ALLOW_EXTERNAL_PUBLISH == 'true' && (steps.mcp_auth.outputs.mode == 'oidc' || steps.mcp_auth.outputs.mode == 'pat')
        run: ./mcp-publisher publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ## Index Server ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.changes }}

            ---

            ### Artifacts
            - **npm**: `@jagilber-org/index-server@${{ steps.version.outputs.version }}` ([npmjs](https://www.npmjs.com/package/@jagilber-org/index-server))
            - **Docker**: `ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}`
            - **MCP Registry name**: `io.github.jagilber-org/index-server`

            ### Install
            ```bash
            npx @jagilber-org/index-server@latest --setup
            ```

            ### Docker Quick Start
            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker run -d -p 8787:8787 ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          files: |
            *.tgz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: false
