name: Release

# Unified release workflow triggered by version tags (v*).
# Runs release-scoped validation, builds release artifacts (npm, Docker),
# creates a GitHub Release with changelog, and publishes packages plus MCP metadata.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and test without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_channel:
        description: 'Promotion channel: gh-only=GitHub Release tarball only; next=npmjs @next dist-tag; latest=npmjs @latest; auto=infer from version (-rc/-beta/-alpha => next, clean semver => latest)'
        required: false
        default: 'gh-only'
        type: choice
        options:
          - 'gh-only'
          - 'next'
          - 'latest'
          - 'auto'
      publish_npmjs:
        description: '[Override] Publish to public npmjs.org. Normally derived from release_channel; set to true/false to force.'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'true'
          - 'false'
      publish_ghpackages:
        description: 'Publish to GitHub Packages npm registry'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'true'
          - 'false'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/index-server-image
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Validate — type check, lint, build, unit smoke test
  # ──────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit test gate
        run: |
          mkdir -p test-results
          npm run test:unit 2>&1 | tee test-results/test-output.log

      - name: Crawl test logs (hygiene gate)
        if: always()
        # Defaults (max-repeat=25, max-stack-warn=25). Known operational
        # categories are signature-allowlisted in .crawl-logs-allowlist.
        run: |
          node scripts/diagnostics/crawl-logs.mjs \
            --dir logs \
            --file test-results/test-output.log \
            --allowlist .crawl-logs-allowlist \
            --summary test-results/log-hygiene.json \
            --strict

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            coverage/

  # ──────────────────────────────────────────────────────────────────
  # Stage 2a: Build npm package
  # ──────────────────────────────────────────────────────────────────
  build-npm:
    name: Build npm Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build

      - name: Pack
        run: npm pack

      - name: Upload npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: '*.tgz'

  # ──────────────────────────────────────────────────────────────────
  # Stage 2b: Build Docker image
  # ──────────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan with Trivy
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Publish — npm, GitHub Release
  # ──────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-npm, build-docker]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.dry_run == 'false'
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
      ALLOW_EXTERNAL_PUBLISH: ${{ github.repository_owner == 'jagilber-org' }}
      MCP_USE_GITHUB_OIDC: ${{ github.repository_owner == 'jagilber-org' }}
      HAS_MCP_GITHUB_TOKEN: ${{ secrets.MCP_GITHUB_TOKEN != '' }}
      # Publish target toggles. Resolution order:
      #   1. release_channel input (when not 'auto')
      #      - gh-only => npmjs=false (only GH Release tarball is produced)
      #      - next    => npmjs=true (publish with --tag next)
      #      - latest  => npmjs=true (publish with --tag latest)
      #   2. release_channel='auto' => infer from version string
      #      - prerelease (-rc.*/-beta.*/-alpha.*) => next
      #      - clean semver                        => latest
      #   3. publish_npmjs override input (when not 'auto') overrides #1/#2
      #   4. Repo-level variable PUBLISH_NPMJS ('true'/'false')
      #   5. Default 'false' (gh-only behavior)
      RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'gh-only' }}
      PUBLISH_NPMJS: >-
        ${{ (github.event.inputs.publish_npmjs != null && github.event.inputs.publish_npmjs != 'auto')
            && github.event.inputs.publish_npmjs
            || (github.event.inputs.release_channel == 'next' || github.event.inputs.release_channel == 'latest') && 'true'
            || (github.event.inputs.release_channel == 'gh-only') && 'false'
            || (vars.PUBLISH_NPMJS != '' && vars.PUBLISH_NPMJS)
            || 'false' }}
      PUBLISH_GHPACKAGES: >-
        ${{ (github.event.inputs.publish_ghpackages != null && github.event.inputs.publish_ghpackages != 'auto')
            && github.event.inputs.publish_ghpackages
            || (vars.PUBLISH_GHPACKAGES != '' && vars.PUBLISH_GHPACKAGES)
            || 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Download npm package
        uses: actions/download-artifact@v8
        with:
          name: npm-package

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract section for this version from CHANGELOG.md
          ESCAPED=$(echo "$VERSION" | sed 's/[.[\*^$()+?{|\\]/\\&/g')
          SECTION=$(sed -n "/^## \[${ESCAPED}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$SECTION" ]; then
            # Fallback: git log between tags
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              SECTION=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            else
              SECTION=$(git log --pretty=format:"- %s (%h)" -20)
            fi
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Resolve publish targets
        id: targets
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${RELEASE_CHANNEL:-gh-only}"
          # Resolve npm dist-tag based on channel + version string
          if [ "$CHANNEL" = "latest" ]; then
            DIST_TAG="latest"
          elif [ "$CHANNEL" = "next" ]; then
            DIST_TAG="next"
          elif [ "$CHANNEL" = "gh-only" ]; then
            DIST_TAG=""   # not published to npmjs
          else
            # auto: prerelease => next, clean => latest
            case "$VERSION" in
              *-rc.*|*-beta.*|*-alpha.*|*-pre.*) DIST_TAG="next" ;;
              *)                                  DIST_TAG="latest" ;;
            esac
          fi
          echo "npmjs=${PUBLISH_NPMJS}" >> "$GITHUB_OUTPUT"
          echo "ghpackages=${PUBLISH_GHPACKAGES}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Publish targets resolved:"
          echo "  release_channel     : ${CHANNEL}"
          echo "  npm dist-tag        : ${DIST_TAG:-(none)}"
          echo "  npmjs.org           : ${PUBLISH_NPMJS}"
          echo "  GitHub Packages     : ${PUBLISH_GHPACKAGES}"
          echo "  HAS_NPM_TOKEN       : ${HAS_NPM_TOKEN}"

      # ──────────────────────────────────────────────────────────────────
      # Publish to public npmjs.org. Required for MCP Registry validation
      # (the registry queries npmjs to verify the package exists).
      # ──────────────────────────────────────────────────────────────────
      - name: Require NPM_TOKEN when npmjs publish requested
        if: steps.targets.outputs.npmjs == 'true' && env.HAS_NPM_TOKEN != 'true'
        run: |
          echo "PUBLISH_NPMJS is true but secrets.NPM_TOKEN is not configured." >&2
          echo "Either configure NPM_TOKEN or set PUBLISH_NPMJS=false (or vars.PUBLISH_NPMJS=false)." >&2
          exit 1

      - name: Configure npmjs registry
        if: steps.targets.outputs.npmjs == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          scope: '@jagilber-org'

      - name: Check npmjs version status
        id: npmjs_status
        if: steps.targets.outputs.npmjs == 'true'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "$PKG@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npmjs
        if: steps.targets.outputs.npmjs == 'true' && steps.npmjs_status.outputs.already_published != 'true'
        run: |
          TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          DIST_TAG="${{ steps.targets.outputs.dist_tag }}"
          DIST_TAG="${DIST_TAG:-latest}"
          if [ -n "$TARBALL" ]; then
            npm publish "$TARBALL" --provenance --access public --tag "$DIST_TAG" --registry=https://registry.npmjs.org
          else
            npm publish --ignore-scripts --provenance --access public --tag "$DIST_TAG" --registry=https://registry.npmjs.org
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ──────────────────────────────────────────────────────────────────
      # Publish to GitHub Packages npm registry. Auth uses GITHUB_TOKEN.
      # ──────────────────────────────────────────────────────────────────
      - name: Configure GitHub Packages registry
        if: steps.targets.outputs.ghpackages == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jagilber-org'

      - name: Check GitHub Packages version status
        id: gpr_status
        if: steps.targets.outputs.ghpackages == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true'
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "$PKG@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # NOTE: continue-on-error is intentional. First-time package creation in
      # the jagilber-org org may return 403 until the package is pre-created
      # or the org enables public package creation. Don't fail the release on
      # this redundant target.
      - name: Publish to GitHub Packages
        if: steps.targets.outputs.ghpackages == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.gpr_status.outputs.already_published != 'true'
        continue-on-error: true
        run: |
          TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -n "$TARBALL" ]; then
            npm publish "$TARBALL" --registry=https://npm.pkg.github.com
          else
            npm publish --ignore-scripts --registry=https://npm.pkg.github.com
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # MCP Registry validates packages by querying public npmjs.org. Skip the
      # entire MCP publish path unless we also published to npmjs in this run.
      - name: Install mcp-publisher
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && (env.MCP_USE_GITHUB_OIDC == 'true' || env.HAS_MCP_GITHUB_TOKEN == 'true')
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Select MCP Registry auth mode
        id: mcp_auth
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true'
        run: |
          if [ "${{ env.MCP_USE_GITHUB_OIDC }}" = "true" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
          elif [ "${{ env.HAS_MCP_GITHUB_TOKEN }}" = "true" ]; then
            echo "mode=pat" >> "$GITHUB_OUTPUT"
          else
            echo "mode=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Require MCP Registry auth for release publish
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'missing'
        run: |
          echo "MCP Registry publish is enabled in this workflow, but no usable auth mode was found." >&2
          echo "Private repo releases must provide MCP_GITHUB_TOKEN; public mirror releases may use GitHub OIDC." >&2
          exit 1

      - name: Authenticate to MCP Registry via GitHub OIDC
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'oidc'
        run: ./mcp-publisher login github-oidc

      - name: Authenticate to MCP Registry via PAT fallback
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && steps.mcp_auth.outputs.mode == 'pat'
        run: ./mcp-publisher login github --token "${{ secrets.MCP_GITHUB_TOKEN }}"

      - name: Publish to MCP Registry
        if: steps.targets.outputs.npmjs == 'true' && env.ALLOW_EXTERNAL_PUBLISH == 'true' && (steps.mcp_auth.outputs.mode == 'oidc' || steps.mcp_auth.outputs.mode == 'pat')
        run: |
          set +e
          output=$(./mcp-publisher publish 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if echo "$output" | grep -qi 'duplicate version'; then
            echo "MCP Registry version already exists; treating publish as idempotent."
            exit 0
          fi
          exit "$status"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ## Index Server ${{ steps.version.outputs.version }}

            ${{ steps.changelog.outputs.changes }}

            ---

            ### Artifacts
            - **GitHub Release tarball**: attached below (`*.tgz`) — installable without auth
            - **npm**: `@jagilber-org/index-server@${{ steps.version.outputs.version }}` (channel: `${{ steps.targets.outputs.channel }}`, dist-tag: `${{ steps.targets.outputs.dist_tag || 'n/a' }}`)
            - **Docker**: `ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}`
            - **MCP Registry name**: `io.github.jagilber-org/index-server`

            ### Install
            ```bash
            # From GitHub Release tarball (no auth required, always available):
            npm install -g https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/jagilber-org-index-server-${{ steps.version.outputs.version }}.tgz
            index-server --setup

            # From npmjs (only if channel is 'next' or 'latest'):
            npm install -g @jagilber-org/index-server@${{ steps.targets.outputs.dist_tag || 'latest' }}
            index-server --setup
            ```

            ### Docker Quick Start
            ```bash
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker run -d -p 8787:8787 ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
          files: |
            *.tgz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') || steps.targets.outputs.channel != 'latest' }}
          generate_release_notes: false
