name: Pre-commit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6 # pii-allowlist: pinned action SHA
        with:
          # Need full history so `pre-commit run --from-ref BASE --to-ref HEAD`
          # can resolve the PR base SHA. Default fetch-depth=1 only has HEAD
          # and breaks `git diff BASE..HEAD` in pre-commit's diff-only mode.
          fetch-depth: 0

      - name: Validate constitution sync
        shell: pwsh
        run: scripts/build/sync-constitution.ps1 -Check

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6 # pii-allowlist: pinned action SHA
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        # Required so the eslint-pre-push hook (template v1.25.0) can
        # invoke `npm run lint` against locally installed eslint during
        # the pre-push policy replay below.
        run: npm ci --no-audit --no-fund

       - name: TypeScript strict mode check
         run: npm run typecheck

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6 # pii-allowlist: pinned action SHA
        with:
          python-version: '3.12'

      - name: Install pre-commit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit detect-secrets ggshield

      - name: Run pre-commit policy (diff-only on PRs)
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Diff-only run avoids burning ggshield API quota on full-repo
            # rescans when the PR only touches a few files.
            pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA"
          else
            # Push-to-main: skip no-commit-to-branch (designed for local devs)
            # via SKIP env var honored by pre-commit framework. The branch
            # protection rule on main covers the policy this hook enforces.
            SKIP=no-commit-to-branch pre-commit run --all-files
          fi


      - name: Run pre-push security policy replay
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --hook-stage pre-push
          else
            pre-commit run --all-files --hook-stage pre-push
          fi

      - name: Generate ggshield JSON report (push-to-main only; PR scan covered by ggshield-pr workflow)
        if: ${{ github.event_name == 'push' && env.GITGUARDIAN_API_KEY != '' }}
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GGSHIELD_QUOTA_MODE: advisory
        run: |
          mkdir -p reports
          bash scripts/ci/ggshield-with-retry.sh secret scan path . --recursive -y --use-gitignore --format json --output reports/ggshield-report.json --exit-zero

      - name: Upload ggshield JSON report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7 # pii-allowlist: pinned action SHA
        with:
          name: ggshield-report
          path: reports/ggshield-report.json
          if-no-files-found: ignore
