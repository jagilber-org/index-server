name: Pre-commit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate constitution sync
        shell: pwsh
        run: scripts/sync-constitution.ps1 -Check

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pre-commit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit detect-secrets ggshield

      - name: Run pre-commit policy
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: pre-commit run --all-files
        continue-on-error: ${{ secrets.GITGUARDIAN_API_KEY == '' }}

      - name: Run pre-push security policy replay
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          pre-commit run --all-files --hook-stage pre-push

      - name: Generate ggshield JSON report
        if: ${{ always() && env.GITGUARDIAN_API_KEY != '' }}
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          mkdir -p reports
          ggshield secret scan path . --recursive -y --use-gitignore --format json --output reports/ggshield-report.json --exit-zero

      - name: Upload ggshield JSON report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: ggshield-report
          path: reports/ggshield-report.json
          if-no-files-found: ignore
