name: Setup Wizard E2E

on:
  pull_request:
    paths:
      - 'scripts/build/setup-wizard.mjs'
      - 'scripts/dist/setup-wizard.mjs'
      - 'scripts/ci/**'
      - 'src/server/index-server.ts'
      - '.github/workflows/setup-wizard-e2e.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/build/setup-wizard.mjs'
      - 'scripts/dist/setup-wizard.mjs'
      - 'scripts/ci/**'
  workflow_dispatch: {}

jobs:
  # ── Config generation & structural validation ─────────────────────────
  # Tests all target × profile combinations, merge behavior, multi-target,
  # and VS Code global scope. Linux-only for cost.
  config-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & build
        run: npm ci && npm run build

      - name: Validate all config combinations
        run: node scripts/ci/setup-wizard-config-validate.mjs

  # ── Windows smoke test ────────────────────────────────────────────────
  # Validates Windows-specific path handling (USERPROFILE, APPDATA, backslash
  # normalization) on a single target × profile to keep cost minimal.
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & build
        run: npm ci && npm run build

      - name: Validate config on Windows
        run: node scripts/ci/setup-wizard-config-validate.mjs

  # ── Deploy & start verification ───────────────────────────────────────
  # Tests the full deploy flow: wizard deploys to an external root, then
  # verifies the server starts and completes an MCP handshake.
  deploy-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & build
        run: npm ci && npm run build

      - name: Deploy to external root
        shell: bash
        run: |
          DEPLOY_ROOT="${RUNNER_TEMP}/index-server-deploy"
          mkdir -p "$DEPLOY_ROOT"
          node scripts/build/setup-wizard.mjs \
            --non-interactive \
            --root "$DEPLOY_ROOT" \
            --port 8799 \
            --target vscode,copilot-cli \
            --no-preview \
            --write
          echo "DEPLOY_ROOT=$DEPLOY_ROOT" >> "$GITHUB_ENV"

      - name: Verify deployed dist exists
        shell: bash
        run: |
          if [ ! -f "$DEPLOY_ROOT/dist/server/index-server.js" ]; then
            echo "::error::dist/server/index-server.js not found at deploy root"
            ls -laR "$DEPLOY_ROOT" || true
            exit 1
          fi
          echo "✅ dist/server/index-server.js exists"

      - name: Verify .env generated
        shell: bash
        run: |
          if [ -f "$DEPLOY_ROOT/.env" ]; then
            echo "✅ .env exists"
            grep -c 'INDEX_SERVER' "$DEPLOY_ROOT/.env" || true
          elif [ -f "$DEPLOY_ROOT/.env.generated" ]; then
            echo "✅ .env.generated exists"
          else
            echo "::error::.env not found at deploy root"
            exit 1
          fi

      - name: Verify .vscode/mcp.json written
        shell: bash
        run: |
          if [ ! -f "$DEPLOY_ROOT/.vscode/mcp.json" ]; then
            echo "::error::.vscode/mcp.json not found"
            exit 1
          fi
          echo "✅ .vscode/mcp.json written"
          grep -q '"index-server"' "$DEPLOY_ROOT/.vscode/mcp.json"

      - name: MCP handshake from deployed root
        shell: bash
        run: |
          node -e "
            const p = require('child_process').spawn(process.execPath,
              ['$DEPLOY_ROOT/dist/server/index-server.js'],
              { stdio: ['pipe','pipe','pipe'], env: { ...process.env, INDEX_SERVER_DASHBOARD: '0' } });
            const init = JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'ci',version:'1.0.0'}}});
            let out = '';
            p.stdout.on('data', d => { out += d; if (out.includes('result')) { console.log('✅ MCP handshake succeeded'); p.kill(); process.exit(0); }});
            p.stderr.on('data', () => {});
            p.on('error', e => { console.error('::error::Server failed to start:', e.message); process.exit(1); });
            setTimeout(() => { console.error('::error::Handshake timed out (8s) — server may not be functional'); p.kill(); process.exit(1); }, 8000);
            p.stdin.write(init + '\n');
          "
        env:
          INDEX_SERVER_DIR: ${{ env.DEPLOY_ROOT }}/instructions

      - name: Verify same-root skips deploy
        shell: bash
        run: |
          OUTPUT=$(node scripts/build/setup-wizard.mjs --non-interactive --no-preview 2>&1)
          if echo "$OUTPUT" | grep -q 'Deploying runtime'; then
            echo "::error::Deploy triggered when root equals package root"
            exit 1
          fi
          echo "✅ No deploy when root == package root"

      - name: Verify --no-deploy flag
        shell: bash
        run: |
          NO_DEPLOY_ROOT="${RUNNER_TEMP}/index-server-no-deploy"
          mkdir -p "$NO_DEPLOY_ROOT"
          OUTPUT=$(node scripts/build/setup-wizard.mjs \
            --non-interactive \
            --root "$NO_DEPLOY_ROOT" \
            --no-deploy \
            --no-preview 2>&1)
          if echo "$OUTPUT" | grep -q 'Deploying runtime'; then
            echo "::error::Deploy ran despite --no-deploy flag"
            exit 1
          fi
          if [ -d "$NO_DEPLOY_ROOT/dist" ]; then
            echo "::error::dist/ should not exist with --no-deploy"
            exit 1
          fi
          echo "✅ --no-deploy correctly skipped deployment"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-verify-logs
          path: |
            ${{ env.DEPLOY_ROOT }}/.env*
            ${{ env.DEPLOY_ROOT }}/.vscode/
            ${{ env.DEPLOY_ROOT }}/package.json
            logs/
          if-no-files-found: warn

  # ── CRUD smoke test per profile ───────────────────────────────────────
  # Starts the server with each profile's env vars, then exercises the full
  # CRUD lifecycle: add → search → get → list → remove → verify deletion.
  # Semantic search is disabled to avoid model download in CI.
  server-crud:
    strategy:
      fail-fast: false
      matrix:
        profile: [default, enhanced, experimental]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & build
        run: npm ci && npm run build

      - name: CRUD test (${{ matrix.profile }})
        run: node scripts/ci/setup-wizard-crud-test.mjs --profile ${{ matrix.profile }}
