<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cf222e"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#238636"/>
    </marker>
  </defs>

  <!-- Row 1: Pipeline -->
  <rect x="20" y="20" width="140" height="36" rx="6" fill="#57606a"/>
  <text x="90" y="43" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Client Request</text>

  <line x1="160" y1="38" x2="188" y2="38" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="190" y="20" width="140" height="36" rx="6" fill="#57606a"/>
  <text x="260" y="43" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">stdio Transport</text>

  <line x1="330" y1="38" x2="358" y2="38" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="360" y="20" width="150" height="36" rx="6" fill="#0550ae"/>
  <text x="435" y="43" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">JSON-RPC Router</text>

  <line x1="510" y1="38" x2="538" y2="38" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="540" y="20" width="160" height="36" rx="6" fill="#0550ae"/>
  <text x="620" y="43" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Action Dispatcher</text>

  <!-- Dispatcher splits into Read and Write -->
  <line x1="580" y1="56" x2="280" y2="100" stroke="#238636" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="660" y1="56" x2="660" y2="100" stroke="#bf5b00" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 2: Read Path -->
  <rect x="140" y="104" width="280" height="32" rx="6" fill="#1a7f37"/>
  <text x="280" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Read Path</text>

  <!-- Read tools -->
  <rect x="140" y="144" width="130" height="26" rx="4" fill="#238636"/>
  <text x="205" y="161" text-anchor="middle" fill="#fff" font-size="11">index_search</text>

  <rect x="278" y="144" width="142" height="26" rx="4" fill="#238636"/>
  <text x="349" y="161" text-anchor="middle" fill="#fff" font-size="11">index_dispatch</text>

  <rect x="140" y="176" width="130" height="26" rx="4" fill="#238636"/>
  <text x="205" y="193" text-anchor="middle" fill="#fff" font-size="11">health_check</text>

  <rect x="278" y="176" width="142" height="26" rx="4" fill="#238636"/>
  <text x="349" y="193" text-anchor="middle" fill="#fff" font-size="11">metrics_snapshot</text>

  <!-- Row 2: Write Path -->
  <rect x="530" y="104" width="260" height="32" rx="6" fill="#953800"/>
  <text x="660" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Write Path</text>

  <!-- Mutation gate -->
  <g transform="translate(660, 172)">
    <polygon points="0,-28 80,0 0,28 -80,0" fill="#cf222e"/>
    <text x="0" y="4" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">MUTATION?</text>
  </g>

  <!-- Mutation → Yes (down) -->
  <line x1="660" y1="200" x2="660" y2="228" stroke="#238636" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="670" y="205" width="34" height="16" rx="8" fill="#238636"/>
  <text x="687" y="217" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Yes</text>

  <!-- Mutation → No (right) -->
  <line x1="740" y1="172" x2="790" y2="172" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="755" y="158" width="26" height="16" rx="8" fill="#cf222e"/>
  <text x="768" y="170" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">No</text>

  <!-- Denied -->
  <rect x="795" y="156" width="90" height="32" rx="6" fill="#cf222e"/>
  <text x="840" y="176" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">403 Denied</text>

  <!-- Write tools (after mutation=yes) -->
  <rect x="570" y="232" width="80" height="26" rx="4" fill="#bf5b00"/>
  <text x="610" y="249" text-anchor="middle" fill="#fff" font-size="11">index_add</text>

  <rect x="656" y="232" width="100" height="26" rx="4" fill="#bf5b00"/>
  <text x="706" y="249" text-anchor="middle" fill="#fff" font-size="11">index_import</text>

  <rect x="762" y="232" width="110" height="26" rx="4" fill="#bf5b00"/>
  <text x="817" y="249" text-anchor="middle" fill="#fff" font-size="11">index_remove</text>

  <!-- Both paths → CatalogContext -->
  <line x1="280" y1="202" x2="280" y2="310" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="280" y1="310" x2="400" y2="340" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="660" y1="258" x2="660" y2="310" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="660" y1="310" x2="530" y2="340" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CatalogContext -->
  <rect x="380" y="330" width="180" height="36" rx="6" fill="#8250df"/>
  <text x="470" y="353" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">CatalogContext</text>

  <!-- Files -->
  <line x1="470" y1="366" x2="470" y2="384" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="358" y="386" width="224" height="28" rx="14" fill="#57606a"/>
  <text x="470" y="404" text-anchor="middle" fill="#fff" font-size="11">instructions/*.json</text>
</svg>
